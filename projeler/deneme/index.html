<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projeler | SAFA YAPI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

header{
padding:80px 20px 40px;
text-align:center;
}

header h1{
font-size:42px;
margin-bottom:10px;
}

header p{
color:#b7bcc7;
}

.container{
width:min(1200px,95%);
margin:auto;
padding-bottom:60px;
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.card{
background:#1e293b;
border-radius:18px;
overflow:hidden;
transition:.35s;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
display:block;
}

.content{
padding:22px;
}

.category{
display:inline-block;
background:#2563eb;
padding:6px 12px;
border-radius:50px;
font-size:13px;
margin-bottom:14px;
}

.content h2{
font-size:24px;
margin-bottom:10px;
}

.meta{
color:#b8bec8;
font-size:15px;
margin-bottom:18px;
}

.desc{
color:#d6d6d6;
line-height:1.7;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:13px 24px;
background:#2563eb;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.btn:hover{
background:#1d4ed8;
}

.loading{
text-align:center;
padding:60px;
font-size:20px;
}

.error{
text-align:center;
padding:50px;
color:#ff7373;
}

</style>

</head>
<body>

<header>

<h1>Projelerimiz</h1>

<p>Tamamlanan ve devam eden projelerimizi inceleyebilirsiniz.</p>

</header>

<div class="container">

<div class="projects" id="projects">

<div class="loading">

Projeler yükleniyor...

</div>

</div>

</div>

<script>

const container=document.getElementById("projects");

fetch("projects.json")

.then(r=>r.json())

.then(data=>{

container.innerHTML="";

data.forEach(project=>{

container.innerHTML+=`

<div class="card">

<img src="${project.cover}" alt="${project.title}">

<div class="content">

<span class="category">${project.category}</span>

<h2>${project.title}</h2>

<div class="meta">

📍 ${project.city} • ${project.year}

</div>

<p class="desc">

${project.description}

</p>

<a class="btn" href="proje.html?id=${project.id}">

Projeyi İncele

</a>

</div>

</div>

`;

});

})

.catch(()=>{

container.innerHTML=`

<div class="error">

Projects.json okunamadı.

</div>

`;

});

</script>

</body>
</html>
