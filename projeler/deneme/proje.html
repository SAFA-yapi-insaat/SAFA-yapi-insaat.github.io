<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proje Detayı | SAFA YAPI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.hero{

width:100%;
height:55vh;

overflow:hidden;
position:relative;

}

.hero img{

width:100%;
height:100%;
object-fit:cover;

}

.overlay{

position:absolute;
inset:0;

background:linear-gradient(to top,#0f172a 5%,rgba(0,0,0,.15));

}

.container{

width:min(1200px,92%);
margin:auto;

padding:50px 0;

}

.back{

display:inline-block;

margin-bottom:30px;

color:white;

text-decoration:none;

background:#2563eb;

padding:12px 22px;

border-radius:12px;

transition:.3s;

}

.back:hover{

background:#1d4ed8;

}

.title{

font-size:42px;

margin-bottom:12px;

}

.meta{

color:#c7ced9;

font-size:17px;

margin-bottom:35px;

}

.description{

font-size:18px;

line-height:1.9;

color:#e8e8e8;

margin-bottom:60px;

}

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:20px;

}

.gallery img{

width:100%;
height:260px;

object-fit:cover;

border-radius:16px;

cursor:pointer;

transition:.35s;

}

.gallery img:hover{

transform:scale(1.03);

}

.loading{

padding:120px;

text-align:center;

font-size:22px;

}

@media(max-width:768px){

.hero{

height:300px;

}

.title{

font-size:32px;

}

.gallery{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div id="app">

<div class="loading">

Proje yükleniyor...

</div>

</div>

<script>

const app = document.getElementById("app");

// URL'deki id'yi al
const id = new URLSearchParams(window.location.search).get("id");

// JSON'u oku
fetch("projects.json")
.then(res => res.json())
.then(projects => {

    // Projeyi bul
    const project = projects.find(p => String(p.id) === String(id));

    // Proje bulunamadıysa
    if(!project){
        app.innerHTML = `
            <div class="container">
                <a href="projeler.html" class="back">← Projelere Dön</a>

                <h1>Proje Bulunamadı</h1>

                <p>Aradığınız proje mevcut değil.</p>
            </div>
        `;
        return;
    }

    // Galeri HTML'i
    let galleryHTML = "";

    project.images.forEach(image => {
        galleryHTML += `
            <img src="${image}" alt="${project.title}">
        `;
    });

    // Sayfayı oluştur
    app.innerHTML = `

        <div class="hero">

            <img src="${project.cover}" alt="${project.title}">

            <div class="overlay"></div>

        </div>

        <div class="container">

            <a href="projeler.html" class="back">

                ← Projelere Dön

            </a>

            <h1 class="title">

                ${project.title}

            </h1>

            <div class="meta">

                📍 ${project.city}
                &nbsp;&nbsp;•
                &nbsp;&nbsp;${project.year}
                &nbsp;&nbsp;•
                &nbsp;&nbsp;${project.category}

            </div>

            <div class="description">

                ${project.description}

            </div>

            <div class="gallery">

                ${galleryHTML}

            </div>

        </div>

    `;

})
.catch(err => {

    console.error(err);

    app.innerHTML = `
        <div class="container">

            <h2>projects.json okunamadı.</h2>

        </div>
    `;

});

</script>
  
</body>
</html>
