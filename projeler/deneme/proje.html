<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proje Detayı | SAFA YAPI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#0f172a;
color:#fff;

}

.hero{

width:100%;
height:60vh;

position:relative;

overflow:hidden;

}

.hero img{

width:100%;
height:100%;
object-fit:cover;

}

.overlay{

position:absolute;

inset:0;

background:linear-gradient(to top,#0f172a 0%,rgba(15,23,42,.15));

}

.container{

width:min(1200px,92%);
margin:auto;

padding:60px 0;

}

.back{

display:inline-flex;

align-items:center;

gap:10px;

text-decoration:none;

background:#2563eb;

color:white;

padding:13px 22px;

border-radius:12px;

margin-bottom:35px;

transition:.3s;

}

.back:hover{

background:#1d4ed8;

transform:translateY(-2px);

}

.title{

font-size:44px;

font-weight:700;

margin-bottom:15px;

}

.meta{

display:flex;

flex-wrap:wrap;

gap:18px;

margin-bottom:35px;

color:#c7ced9;

font-size:16px;

}

.description{

font-size:18px;

line-height:1.9;

color:#e4e4e4;

margin-bottom:60px;

}

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:20px;

}

.gallery img{

width:100%;

height:260px;

object-fit:cover;

border-radius:18px;

cursor:pointer;

transition:.35s;

box-shadow:0 10px 30px rgba(0,0,0,.25);

}

.gallery img:hover{

transform:scale(1.03);

}

.loading{

padding:120px;

text-align:center;

font-size:22px;

}

.lightbox{

position:fixed;

inset:0;

display:none;

justify-content:center;

align-items:center;

background:rgba(0,0,0,.94);

z-index:9999;

padding:30px;

}

.lightbox.active{

display:flex;

}

.lightbox img{

max-width:90%;

max-height:90%;

border-radius:16px;

object-fit:contain;

}

.close{

position:absolute;

top:25px;

right:35px;

font-size:48px;

cursor:pointer;

user-select:none;

}

.nav{

position:absolute;

top:50%;

transform:translateY(-50%);

font-size:55px;

padding:15px;

cursor:pointer;

user-select:none;

}

.prev{

left:30px;

}

.next{

right:30px;

}

@media(max-width:768px){

.hero{

height:320px;

}

.title{

font-size:32px;

}

.gallery{

grid-template-columns:1fr;

}

.nav{

font-size:42px;

}

}

</style>

</head>

<body>

<div id="app">

<div class="loading">

Proje yükleniyor...

</div>

</div>

<script>

const app=document.getElementById("app");

const id=new URLSearchParams(location.search).get("id");

fetch("projects.json")

.then(r=>r.json())

.then(projects=>{

const project=projects.find(p=>String(p.id)===String(id));

if(!project){

app.innerHTML=`

<div class="container">

<a href="projeler.html" class="back">

← Projelere Dön

</a>

<h1>Proje Bulunamadı</h1>

<p>Aradığınız proje mevcut değil.</p>

</div>

`;

return;

}

let galleryHTML="";

project.images.forEach(image=>{

galleryHTML+=`

<img src="${image}" alt="${project.title}">

`;

});

app.innerHTML=`

<div class="hero">

<img src="${project.cover}" alt="${project.title}">

<div class="overlay"></div>

</div>

<div class="container">

<a href="projeler.html" class="back">

← Projelere Dön

</a>

<h1 class="title">

${project.title}

</h1>

<div class="meta">

<span>📍 ${project.city}</span>

<span>📅 ${project.year}</span>

<span>🏗 ${project.category}</span>

</div>

<div class="description">

${project.description}

</div>

<div class="gallery">

${galleryHTML}

</div>

</div>

<div class="lightbox" id="lightbox">

<div class="close">&times;</div>

<div class="nav prev">&#10094;</div>

<img id="lightboxImage">

<div class="nav next">&#10095;</div>

</div>
`;

const images=[...document.querySelectorAll(".gallery img")];

const lightbox=document.getElementById("lightbox");

const lightboxImage=document.getElementById("lightboxImage");

const close=document.querySelector(".close");

const prev=document.querySelector(".prev");

const next=document.querySelector(".next");

let current=0;

function show(index){

current=index;

lightboxImage.src=images[current].src;

}

images.forEach((img,index)=>{

img.addEventListener("click",()=>{

lightbox.classList.add("active");

show(index);

});

});

close.onclick=()=>{

lightbox.classList.remove("active");

};

lightbox.onclick=e=>{

if(e.target===lightbox){

lightbox.classList.remove("active");

}

};

prev.onclick=()=>{

current--;

if(current<0){

current=images.length-1;

}

show(current);

};

next.onclick=()=>{

current++;

if(current>=images.length){

current=0;

}

show(current);

};

document.addEventListener("keydown",e=>{

if(!lightbox.classList.contains("active")) return;

if(e.key==="Escape"){

lightbox.classList.remove("active");

}

if(e.key==="ArrowRight"){

next.click();

}

if(e.key==="ArrowLeft"){

prev.click();

}

});

})

.catch(()=>{

app.innerHTML=`

<div class="container">

<h1>Hata</h1>

<p>projects.json dosyası okunamadı.</p>

<a href="projeler.html" class="back">

← Projelere Dön

</a>

</div>

`;

});

</script>

</body>
</html>
