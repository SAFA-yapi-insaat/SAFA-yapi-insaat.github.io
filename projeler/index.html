<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Error | SAFA Yapı İnşaat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#00b3ff,#0d6efd);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

overflow:hidden;

}

.card{

background:rgba(255,255,255,.12);

backdrop-filter:blur(12px);

padding:50px;

border-radius:25px;

text-align:center;

width:90%;
max-width:550px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

width:90px;

margin-bottom:20px;

}

h1{

font-size:110px;

line-height:1;

}

h2{

margin:15px 0;

font-size:30px;

}

p{

opacity:.9;

margin-bottom:35px;

line-height:1.8;

}

a{

display:inline-block;

padding:15px 35px;

background:white;

color:#005da4;

border-radius:50px;

text-decoration:none;

font-weight:600;

transition:.3s;

}

a:hover{

transform:translateY(-4px);

box-shadow:0 12px 25px rgba(0,0,0,.25);

}

@media(max-width:768px){

h1{

font-size:70px;

}

h2{

font-size:22px;

}

.card{

padding:35px 25px;

}

}

</style>

</head>

<body>

<div class="card">

<img src="/galeri/logo.png" class="logo" alt="Logo">

<h1>404</h1>

<h2>Sayfa Bulunamadı</h2>

<p>

Aradığınız sayfa daha yapım sürecinde.

</p>

<a href="https://safa-yapi-insaat.github.io/">

Ana Sayfaya Dön

</a>

</div>

</body>
</html>
